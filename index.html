<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 驗證碼查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .loading-ring { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full glass-panel rounded-[2rem] shadow-2xl p-8 transition-all hover:shadow-blue-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-tr from-red-600 to-red-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <span class="text-white text-3xl font-black italic">A</span>
            </div>
            <h1 class="text-2xl font-black text-gray-800 tracking-tighter">驗證碼查詢系統</h1>
            <p class="text-gray-400 text-sm mt-1">繁體精簡版 (v2.1)</p>
        </div>

        <div class="bg-blue-50 rounded-2xl p-4 mb-6 flex gap-3 items-start border border-blue-100">
            <span class="text-blue-500 mt-0.5">ℹ</span>
            <p class="text-xs text-blue-700 leading-relaxed">
                <strong>系統提醒：</strong> 請勿重複嘗試錯誤代碼。如需最新驗證碼，請點擊查詢按鈕獲取系統當前記錄。
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1 mb-2">Email Address</label>
                <input type="email" id="email" value="748kvi41b@psai.xin"
                    class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none transition-all font-bold text-gray-700 shadow-sm"
                    placeholder="請輸入郵箱帳號">
            </div>

            <button onclick="fetchVerificationCode()" id="queryBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 flex justify-center items-center gap-3">
                <span id="btnText">立即獲取驗證碼</span>
                <div id="btnLoader" class="loading-ring hidden"></div>
            </button>
        </div>

        <div id="resultBox" class="mt-10 pt-8 border-t border-gray-100 hidden animate-fade-in text-center">
            <span class="text-[10px] font-black text-gray-300 tracking-[0.3em] uppercase">Verification Code</span>
            <div id="codeDisplay" class="text-5xl font-black text-blue-600 mt-3 tracking-tighter">------</div>
            <p id="timeInfo" class="text-[10px] text-gray-400 mt-4 font-medium uppercase"></p>
        </div>

        <div class="mt-12 text-center">
            <p class="text-[9px] text-gray-300 font-bold tracking-[0.2em] uppercase">Gateway: live.psai.xin via Proxy</p>
        </div>
    </div>

    <script>
        async function fetchVerificationCode() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('queryBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const resultBox = document.getElementById('resultBox');
            const codeDisplay = document.getElementById('codeDisplay');
            const timeInfo = document.getElementById('timeInfo');

            if (!email) return alert('請輸入郵箱地址');

            // UI 鎖定狀態
            btn.disabled = true;
            btnText.innerText = '正在繞過防護請求中';
            btnLoader.classList.remove('hidden');
            resultBox.classList.remove('hidden');
            codeDisplay.innerText = "讀取中";
            codeDisplay.classList.add('animate-pulse', 'text-gray-300');

            // 雙代理邏輯 (解決 HTTPS/CORS 限制)
            const target = `http://live.psai.xin/proxy.php?email=${encodeURIComponent(email)}`;
            // 優先使用 allorigins 代理
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const content = data.contents; // 這是代理回傳的 HTML/純文字內容

                // 使用正則表達式提取 6 位連續數字
                const codeMatch = content.match(/\d{6}/);

                if (codeMatch) {
                    codeDisplay.innerText = codeMatch[0];
                    codeDisplay.classList.remove('animate-pulse', 'text-gray-300');
                    codeDisplay.classList.add('text-blue-600');
                    timeInfo.innerText = "更新於: " + new Date().toLocaleTimeString();
                } else {
                    codeDisplay.innerText = "無資料";
                    timeInfo.innerText = "目前郵箱內暫無驗證碼";
                }
            } catch (error) {
                console.error('Fetch error:', error);
                codeDisplay.innerText = "失敗";
                timeInfo.innerText = "無法連線至 API，請檢查網路或代理狀態";
            } finally {
                btn.disabled = false;
                btnText.innerText = '立即獲取驗證碼';
                btnLoader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
