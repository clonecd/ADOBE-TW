<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 驗證碼安全查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0c0c0e; color: #f4f4f5; }
        .glass-card { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #canvas-source { position: absolute; left: -9999px; top: -9999px; background: #0c0c0e; padding: 20px; font-size: 60px; font-weight: 900; color: #3b82f6; font-style: italic; }
        .screenshot-display { cursor: pointer; transition: transform 0.2s; max-width: 100%; height: auto; margin: 0 auto; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)); }
        .screenshot-display:hover { transform: scale(1.05); }
        .copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 100; }
        @keyframes loading-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .loading { animation: loading-pulse 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="toast" class="copy-toast">✓ 驗證碼截圖內容已複製</div>

    <div id="canvas-source">000000</div>

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-10 shadow-2xl text-center">
        <header class="mb-10">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 mb-6">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Image Secure Mode</span>
            </div>
            <h1 class="text-3xl font-black text-white">Adobe 查詢框架</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">驗證碼以加密截圖顯示</p>
        </header>

        <div class="space-y-6">
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl py-4 text-sm font-bold text-zinc-400">
                748kvi41b@psai.xin
            </div>
            <button onclick="fetchAndCapture()" id="queryBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-blue-900/30">
                獲取驗證碼截圖
            </button>
        </div>

        <div id="resultArea" class="mt-12 pt-8 border-t border-zinc-800 hidden">
            <span class="text-[10px] font-black text-zinc-600 tracking-[0.3em] uppercase">Latest Captured Image</span>
            
            <div id="image-container" class="mt-6 min-h-[80px] flex items-center justify-center" onclick="copyValue()">
                <div id="wait-text" class="text-zinc-700 font-black text-4xl loading">GENERATING...</div>
            </div>
            
            <p id="status" class="mt-6 text-[10px] font-bold text-zinc-500 uppercase">準備通訊</p>
        </div>
    </div>

    <script>
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        const TARGET_EMAIL = '748kvi41b@psai.xin';
        let lastCode = "";

        async function fetchAndCapture() {
            const btn = document.getElementById('queryBtn');
            const resultArea = document.getElementById('resultArea');
            const imageContainer = document.getElementById('image-container');
            const status = document.getElementById('status');
            const source = document.getElementById('canvas-source');

            btn.disabled = true;
            btn.innerText = '正在攔截數據...';
            resultArea.classList.remove('hidden');
            imageContainer.innerHTML = '<div class="text-zinc-700 font-black text-4xl loading">READING...</div>';
            status.innerText = "穿透加密隧道中";

            try {
                const response = await fetch(`${PROXY_URL}?email=${encodeURIComponent(TARGET_EMAIL)}`);
                const text = await response.text();
                const match = text.match(/\d{6}/);

                if (match) {
                    lastCode = match[0];
                    source.innerText = lastCode; // 將文字填入隱藏的渲染區
                    
                    // 等待微秒確保文字已渲染，然後轉成截圖
                    setTimeout(async () => {
                        const canvas = await html2canvas(source, { backgroundColor: null });
                        const imgData = canvas.toDataURL("image/png");
                        
                        imageContainer.innerHTML = `<img src="${imgData}" class="screenshot-display" title="點擊複製數字">`;
                        status.innerText = "截圖生成成功 | " + new Date().toLocaleTimeString();
                    }, 300);
                } else {
                    imageContainer.innerHTML = '<div class="text-zinc-800 font-black text-2xl uppercase">No Data</div>';
                    status.innerText = "目前查無驗證碼";
                }
            } catch (err) {
                imageContainer.innerHTML = '<div class="text-red-900 font-black text-2xl uppercase">Error</div>';
                status.innerText = "連線失敗";
            } finally {
                btn.disabled = false;
                btn.innerText = '獲取驗證碼截圖';
            }
        }

        function copyValue() {
            if (!lastCode) return;
            navigator.clipboard.writeText(lastCode).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
