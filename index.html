<script>
    // 優先使用您的 Google Script 網址
    const PRIMARY_PROXY = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
    
    // 備援通道 (公共代理)
    const BACKUP_PROXY = 'https://api.allorigins.win/get?url=';
    const TARGET_BASE = 'http://live.psai.xin/proxy.php?email=';

    async function fetchAndCapture() {
        const email = document.getElementById('emailInput').value.trim();
        const btn = document.getElementById('queryBtn');
        const status = document.getElementById('status');
        const imageContainer = document.getElementById('image-container');

        btn.disabled = true;
        status.innerText = "嘗試連線主通道...";

        try {
            // --- 嘗試 1：Google Apps Script ---
            let response = await fetch(`${PRIMARY_PROXY}?email=${encodeURIComponent(email)}`);
            let text = await response.text();
            
            // 如果 Google 回傳錯誤或空白，嘗試備援通道
            if (!text || text.includes('error')) throw new Error('Primary failed');
            
            processCode(text);

        } catch (err) {
            status.innerText = "主通道失敗，啟動備援通道...";
            try {
                // --- 嘗試 2：Allorigins 公共代理 ---
                const targetUrl = TARGET_BASE + encodeURIComponent(email);
                const res = await fetch(BACKUP_PROXY + encodeURIComponent(targetUrl));
                const data = await res.json();
                processCode(data.contents);
            } catch (backupErr) {
                imageContainer.innerHTML = '<div class="text-red-500 font-black text-2xl uppercase italic">連線全數失敗</div>';
                status.innerText = "請確認原網站是否在線";
            }
        } finally {
            btn.disabled = false;
        }
    }

    function processCode(rawText) {
        const match = rawText.match(/\d{6}/);
        if (match) {
            lastFetchedCode = match[0];
            renderImage(lastFetchedCode);
        } else {
            document.getElementById('image-container').innerHTML = '無資料';
            document.getElementById('status').innerText = "目前無驗證碼";
        }
    }
</script>
