<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>PSAI 備援查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="card w-full max-w-md rounded-[2rem] p-8 shadow-2xl">
        <h1 class="text-2xl font-bold mb-2 text-center">Adobe 驗證碼查詢</h1>
        <p class="text-gray-400 text-center text-xs mb-8">支援多重代理自動備援系統</p>

        <div class="space-y-4">
            <input type="email" id="email" value="748kvi41b@psai.xin" 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all font-mono">
            
            <button onclick="smartFetch()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition-all active:scale-95">
                啟動智能查詢
            </button>
        </div>

        <div id="result" class="mt-8 hidden border-t border-slate-800 pt-6">
            <div class="text-center">
                <span class="text-[10px] text-gray-500 uppercase tracking-widest">Verification Code</span>
                <div id="code" class="text-5xl font-black text-blue-400 my-4 tracking-tighter">------</div>
                <div class="flex items-center justify-center gap-2">
                    <span id="dot" class="status-dot bg-gray-500"></span>
                    <span id="msg" class="text-[10px] text-gray-500 uppercase">等待指令</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function smartFetch() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn');
            const codeDisp = document.getElementById('code');
            const msg = document.getElementById('msg');
            const dot = document.getElementById('dot');
            const resultDiv = document.getElementById('result');

            btn.disabled = true;
            resultDiv.classList.remove('hidden');
            codeDisp.innerText = "WAIT";
            dot.className = "status-dot bg-yellow-500 animate-pulse";

            // 代理池清單
            const target = `http://live.psai.xin/proxy.php?email=${encodeURIComponent(email)}`;
            const proxies = [
                `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`,
                `https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=none&url=${encodeURIComponent(target)}`,
                `https://yacdn.org/proxy/${encodeURIComponent(target)}`
            ];

            let success = false;

            // 循環嘗試所有代理
            for (let i = 0; i < proxies.length; i++) {
                msg.innerText = `正在嘗試通道 ${i + 1}...`;
                try {
                    const response = await fetch(proxies[i]);
                    const data = i === 0 ? (await response.json()).contents : await response.text();
                    
                    const codeMatch = data.match(/\d{6}/);
                    if (codeMatch) {
                        codeDisp.innerText = codeMatch[0];
                        dot.className = "status-dot bg-green-500";
                        msg.innerText = "查詢成功 (通道 " + (i + 1) + ")";
                        success = true;
                        break; // 成功後跳出循環
                    }
                } catch (e) {
                    console.warn(`通道 ${i + 1} 失敗`);
                }
            }

            if (!success) {
                codeDisp.innerText = "FAIL";
                dot.className = "status-dot bg-red-500";
                msg.innerText = "所有代理通道皆無法連線";
            }
            
            btn.disabled = false;
        }
    </script>
</body>
</html>
