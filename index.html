<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頁面轉接中 - PSAI Live</title>
    <style>
        :root {
            --primary-color: #007AFF;
            --bg-color: #f4f4f7;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
    </style>
    <script>
        const targetUrl = "https://live.psai.xin";
        let seconds = 3;

        function countdown() {
            if (seconds <= 0) {
                window.location.href = targetUrl;
            } else {
                document.getElementById('timer').innerText = seconds;
                seconds--;
                setTimeout(countdown, 1000);
            }
        }
        window.onload = countdown;
    </script>
</head>
<body>

    <div class="container">
        <div class="loader"></div>
        <h1>正在前往 PSAI Live</h1>
        <p>請稍候，系統將在 <span id="timer">3</span> 秒後為您轉接...</p>
        
        <a href="https://live.psai.xin" class="btn">立即跳轉</a>
        
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
            <p style="font-size: 0.7rem; color: #999;">© 2024 PSAI 精簡導航版</p>
        </div>
    </div>

</body>
</html>
