<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adobe 驗證碼</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f11;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .card {
    background: #1a1a1f;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .logo {
    font-size: 32px;
    font-weight: 900;
    color: #ff0000;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 12px;
    color: #555;
    margin-bottom: 32px;
  }

  /* 驗證碼顯示區 */
  .otp-box {
    background: #111114;
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 28px 20px;
    margin-bottom: 20px;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
  }
  .otp-box.has-code {
    border-color: rgba(255, 0, 0, 0.3);
  }
  .otp-code {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: 8px;
    color: #fff;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 10px;
  }
  .otp-time {
    font-size: 11px;
    color: #444;
  }
  .otp-placeholder {
    font-size: 14px;
    color: #333;
  }

  /* 複製提示 */
  .copy-hint {
    font-size: 11px;
    color: #2d9e2d;
    height: 16px;
    margin-bottom: 8px;
    transition: opacity 0.3s;
    opacity: 0;
  }
  .copy-hint.show { opacity: 1; }

  /* 按鈕 */
  .btn-fetch {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #e1251b;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 10px;
  }
  .btn-fetch:hover { background: #c41f16; }
  .btn-fetch:active { transform: scale(0.98); }
  .btn-fetch:disabled { background: #333; color: #555; cursor: not-allowed; }

  .btn-copy {
    width: 100%;
    padding: 11px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: transparent;
    color: #888;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-copy:hover { background: rgba(255,255,255,0.05); color: #ccc; }
  .btn-copy.show { display: block; }

  /* 錯誤訊息 */
  .error-msg {
    font-size: 12px;
    color: #e05; 
    margin-top: 10px;
    min-height: 18px;
  }

  /* 載入動畫 */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Adobe</div>
  <div class="subtitle">驗證碼讀取器</div>

  <div class="otp-box" id="otpBox">
    <div class="otp-placeholder" id="otpPlaceholder">點擊下方按鈕抓取驗證碼</div>
    <div class="otp-code" id="otpCode" style="display:none"></div>
    <div class="otp-time" id="otpTime"></div>
  </div>

  <div class="copy-hint" id="copyHint">✅ 已複製到剪貼簿</div>

  <button class="btn-fetch" id="fetchBtn" onclick="fetchCode()">
    🔍 抓取最新驗證碼
  </button>

  <button class="btn-copy" id="copyBtn" onclick="copyCode()">
    📋 複製驗證碼
  </button>

  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbw4LJcTSFZ6Y9uvKbtRwlCrBYqszlTt1HVoVh4E3UtF_KItJON7cyfds2OaM09HMS-C/exec';

  var currentCode = '';
  var cooldownTimer = null;
  var COOLDOWN = 30;

  function fetchCode() {
    var btn = document.getElementById('fetchBtn');
    var errorMsg = document.getElementById('errorMsg');

    if (btn.disabled) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>讀取中...';
    errorMsg.textContent = '';

    fetch(GAS_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          showCode(data.code, data.time);
        } else {
          errorMsg.textContent = '⚠️ ' + (data.message || '找不到驗證碼');
        }
      })
      .catch(function(e) {
        errorMsg.textContent = '❌ 連線失敗，請確認 GAS 網址是否正確';
      })
      .finally(function() {
        startCooldown(btn);
      });
  }

  function startCooldown(btn) {
    var remaining = COOLDOWN;
    btn.disabled = true;
    btn.innerHTML = '⏳ 請等待 ' + remaining + ' 秒';

    if (cooldownTimer) clearInterval(cooldownTimer);
    cooldownTimer = setInterval(function() {
      remaining--;
      if (remaining <= 0) {
        clearInterval(cooldownTimer);
        cooldownTimer = null;
        btn.disabled = false;
        btn.innerHTML = '🔍 抓取最新驗證碼';
      } else {
        btn.innerHTML = '⏳ 請等待 ' + remaining + ' 秒';
      }
    }, 1000);
  }

  function showCode(code, time) {
    currentCode = code;
    document.getElementById('otpPlaceholder').style.display = 'none';
    document.getElementById('otpCode').style.display = 'block';
    document.getElementById('otpCode').textContent = code;
    document.getElementById('otpTime').textContent = '收信時間：' + time;
    document.getElementById('otpBox').classList.add('has-code');
    document.getElementById('copyBtn').classList.add('show');
  }

  function copyCode() {
    if (!currentCode) return;
    navigator.clipboard.writeText(currentCode).then(function() {
      var hint = document.getElementById('copyHint');
      hint.classList.add('show');
      setTimeout(function() { hint.classList.remove('show'); }, 2000);
    });
  }
</script>
</body>
</html>
