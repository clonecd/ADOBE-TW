<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 帳號驗證碼查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .code-font { font-family: 'Courier New', Courier, monospace; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-3xl shadow-xl p-8 border border-gray-100">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-red-200">
                <span class="text-white text-3xl font-bold">A</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Adobe 驗證碼查詢</h1>
            <p class="text-gray-500 mt-2 text-sm">快速查詢您的郵箱驗證碼</p>
        </div>

        <div class="bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded-r-lg">
            <p class="text-xs text-red-700 leading-relaxed">
                <strong>重要提醒：</strong><br>
                驗證碼輸入錯誤禁止重複輸入！請點擊下方按鈕獲取最新驗證碼。
            </p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1 ml-1 uppercase">電子郵件帳號</label>
                <input type="email" id="email" 
                    placeholder="請輸入您的郵箱帳號" 
                    class="w-full px-4 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all text-lg font-medium">
            </div>

            <button onclick="doQuery()" id="queryBtn"
                class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex justify-center items-center">
                <span>立即查詢驗證碼</span>
            </button>
        </div>

        <div id="result-box" class="hidden mt-10 pt-8 border-t border-dashed border-gray-200 text-center">
            <h2 class="text-xs font-bold text-gray-400 tracking-widest uppercase mb-4">最新收到的驗證碼</h2>
