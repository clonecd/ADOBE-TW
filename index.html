<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAI 繁體強制轉接系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #09090b; color: #f4f4f5; }
        .glass-ui { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* 截圖源樣式：斜體、超粗體、繁體科技感 */
        #render-source { position: absolute; left: -9999px; background: #09090b; padding: 25px; font-size: 70px; font-weight: 900; color: #3b82f6; font-style: italic; }
        .code-img { cursor: pointer; transition: all 0.3s; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.4)); }
        .code-img:hover { transform: scale(1.08) rotate(-1deg); }
        .copy-success { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 99; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="copy-msg" class="copy-success shadow-lg shadow-green-900/20 text-sm">✓ 驗證碼已自動複製</div>
    <div id="render-source">000000</div>

    <main class="w-full max-w-md glass-ui rounded-[3rem] p-10 shadow-2xl relative">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>
        
        <header class="text-center mb-12">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 mb-4">
                <span class="text-[10px] font-bold text-blue-400 tracking-[0.2em] uppercase">Private Proxy Active</span>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter">PSAI 繁體框架</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">強制轉接 & 截圖模式</p>
        </header>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-zinc-600 ml-1 tracking-widest uppercase">目標帳號 (Email)</label>
                <input type="email" id="targetEmail" value="748kvi41b@psai.xin" 
                    class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-6 py-4 outline-none focus:border-blue-500/50 transition-all text-lg font-bold">
            </div>
            
            <button onclick="runForceFetch()" id="actionBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl transition-all active:scale-[0.97] shadow-xl shadow-blue-900/20 text-lg">
                強制獲取驗證碼
            </button>
        </div>

        <div id="displayArea" class="mt-12 pt-8 border-t border-zinc-800/50 hidden text-center">
            <p class="text-[10px] font-black text-zinc-600 tracking-[0.3em] uppercase mb-6">Security Token Image</p>
            
            <div id="image-output" class="min-h-[100px] flex items-center justify-center" onclick="copyToClipboard()">
                <div class="text-zinc-800 font-black text-4xl animate-pulse italic">CONNECTING</div>
            </div>

            <div id="status-bar" class="mt-8 flex items-center justify-center gap-3">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-zinc-700"></div>
                <span id="status-text" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">系統待命</span>
            </div>
        </div>

        <p class="mt-10 text-center text-[9px] text-zinc-700 font-bold tracking-widest italic uppercase leading-relaxed">
            此框架已強制覆蓋簡體內容<br>並透過 Google Script 隧道加密傳輸
        </p>
    </main>

    <script>
        // 設定區：請確保這是你部署的 Google Apps Script 網址
        const PROXY_GATEWAY = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        let currentCode = "";

        async function runForceFetch() {
            const email = document.getElementById('targetEmail').value.trim();
            const btn = document.getElementById('actionBtn');
            const area = document.getElementById('displayArea');
            const output = document.getElementById('image-output');
            const status = document.getElementById('status-text');
            const dot = document.getElementById('status-dot');
            const source = document.getElementById('render-source');

            if (!email) return alert('請輸入郵箱');

            // 啟動狀態
            btn.disabled = true;
            btn.innerText = '強制傳輸中...';
            area.classList.remove('hidden');
            output.innerHTML = '<div class="text-zinc-800 font-black text-4xl animate-pulse italic uppercase">Linking</div>';
            status.innerText = "正在穿透伺服器限制";
            dot.className = "w-2 h-2 rounded-full bg-yellow-500 animate-ping";

            try {
                // 發送至 Google Script
                const response = await fetch(`${PROXY_GATEWAY}?email=${encodeURIComponent(email)}`);
                const rawText = await response.text();
                
                // 強制匹配 6 位數字
                const codeMatch = rawText.match(/\d{6}/);

                if (codeMatch) {
                    currentCode = codeMatch[0];
                    source.innerText = currentCode;

                    // 轉換截圖
                    setTimeout(async () => {
                        const canvas = await html2canvas(source, { backgroundColor: null, scale: 2 });
                        const imgData = canvas.toDataURL("image/png");
                        output.innerHTML = `<img src="${imgData}" class="code-img" title="點擊自動複製">`;
                        status.innerText = "強制轉換成功 | " + new Date().toLocaleTimeString('zh-TW');
                        dot.className = "w-2 h-2 rounded-full bg-green-500";
                    }, 400);
                } else {
                    throw new Error('目前查無驗證碼數據');
                }
            } catch (err) {
                output.innerHTML = '<div class="text-zinc-800 font-black text-2xl uppercase">No Data</div>';
                status.innerText = err.message;
                dot.className = "w-2 h-2 rounded-full bg-red-500";
            } finally {
                btn.disabled = false;
                btn.innerText = '強制獲取驗證碼';
            }
        }

        function copyToClipboard() {
            if (!currentCode) return;
            navigator.clipboard.writeText(currentCode).then(() => {
                const msg = document.getElementById('copy-msg');
                msg.style.opacity = '1';
                setTimeout(() => { msg.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
