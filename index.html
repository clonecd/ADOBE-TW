<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAI 繁體安全框架 - 修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0c0c0e; color: #f4f4f5; }
        .glass { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* 截圖源：初始設為透明，避免 000000 出現 */
        #render-source { 
            position: absolute; 
            left: -9999px; 
            background: #0c0c0e; 
            padding: 30px; 
            font-size: 80px; 
            font-weight: 900; 
            color: #3b82f6; 
            font-style: italic; 
            min-width: 300px;
            text-align: center;
        }
        .code-img { cursor: pointer; transition: all 0.3s; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5)); }
        .code-img:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="render-source"></div> <main class="w-full max-w-md glass rounded-[3rem] p-10 shadow-2xl text-center">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-white italic tracking-tighter">PSAI FRAME</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">強制轉繁體截圖系統</p>
        </header>

        <div class="space-y-6">
            <input type="email" id="email" value="748kvi41b@psai.xin" 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-4 outline-none focus:border-blue-500 transition-all text-center font-bold">
            
            <button onclick="safeFetch()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all shadow-lg">
                獲取驗證碼
            </button>
        </div>

        <div id="result" class="mt-12 pt-8 border-t border-zinc-800 hidden">
            <div id="image-out" class="min-h-[120px] flex items-center justify-center" onclick="copyCode()">
                <div class="text-zinc-800 font-black text-4xl animate-pulse">讀取中...</div>
            </div>
            <p id="status" class="mt-6 text-[10px] font-bold text-zinc-600 uppercase tracking-widest">等待連線</p>
        </div>
    </main>

    <script>
        const API_GATEWAY = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        let lastCode = "";

        async function safeFetch() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btn');
            const out = document.getElementById('image-out');
            const status = document.getElementById('status');
            const source = document.getElementById('render-source');

            btn.disabled = true;
            btn.innerText = '正在處理資料...';
            document.getElementById('result').classList.remove('hidden');
            out.innerHTML = '<div class="text-zinc-800 font-black text-4xl animate-pulse">連線中...</div>';
            
            try {
                const res = await fetch(`${API_GATEWAY}?email=${encodeURIComponent(email)}`);
                const text = await res.text();
                const match = text.match(/\d{6}/);

                if (match) {
                    lastCode = match[0];
                    
                    // --- 修正點：先將文字寫入隱藏區，確保不為空白或 000000 ---
                    source.innerText = lastCode;

                    // --- 修正點：延遲截圖，確保文字已渲染完成 ---
                    status.innerText = "正在生成安全截圖...";
                    setTimeout(async () => {
                        const canvas = await html2canvas(source, { 
                            backgroundColor: null,
                            scale: 2,
                            logging: false
                        });
                        const imgData = canvas.toDataURL("image/png");
                        out.innerHTML = `<img src="${imgData}" class="code-img" title="點擊複製">`;
                        status.innerText = "更新時間: " + new Date().toLocaleTimeString();
                    }, 500); 

                } else {
                    out.innerHTML = '<div class="text-zinc-700 font-bold italic text-2xl">目前查無代碼</div>';
                    status.innerText = "伺服器暫無數據";
                }
            } catch (err) {
                out.innerHTML = '<div class="text-red-900 font-bold">ERROR</div>';
                status.innerText = "API 通訊失敗";
            } finally {
                btn.disabled = false;
                btn.innerText = '獲取驗證碼';
            }
        }

        function copyCode() {
            if (!lastCode) return;
            navigator.clipboard.writeText(lastCode);
            alert("驗證碼 " + lastCode + " 已複製");
        }
    </script>
</body>
</html>
