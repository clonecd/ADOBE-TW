<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 驗證碼安全查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0c0c0e; color: #f4f4f5; }
        .glass-card { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        #canvas-source { position: absolute; left: -9999px; top: -9999px; background: #0c0c0e; padding: 20px; font-size: 60px; font-weight: 900; color: #3b82f6; font-style: italic; letter-spacing: -0.05em; }
        .screenshot-display { cursor: pointer; transition: transform 0.2s; max-width: 100%; height: auto; margin: 0 auto; filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)); }
        .screenshot-display:hover { transform: scale(1.05); }
        .copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 100; }
        @keyframes loading-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .loading { animation: loading-pulse 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="toast" class="copy-toast">✓ 驗證碼已複製</div>
    <div id="canvas-source">000000</div>

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-10 shadow-2xl text-center">
        <header class="mb-10">
            <div id="connection-dot" class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-zinc-800 border border-zinc-700 mb-6">
                <span class="w-1.5 h-1.5 bg-zinc-500 rounded-full"></span>
                <span id="connection-status" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">系統待命</span>
            </div>
            <h1 class="text-3xl font-black text-white">Adobe 查詢框架</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">內建錯誤檢查與自動修復機制</p>
        </header>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest">輸入郵箱帳號</label>
                <input type="email" id="emailInput" value="748kvi41b@psai.xin" 
                    class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-6 py-4 outline-none focus:border-blue-500/50 transition-all text-lg font-bold text-white">
            </div>
            <button onclick="fetchAndCapture()" id="queryBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                獲取驗證碼截圖
            </button>
        </div>

        <div id="resultArea" class="mt-12 pt-8 border-t border-zinc-800 hidden">
            <div id="image-container" class="mt-6 min-h-[80px] flex items-center justify-center" onclick="copyValue()">
                <div class="text-zinc-700 font-black text-4xl loading">CONNECTING...</div>
            </div>
            <p id="error-msg" class="mt-6 text-[10px] font-bold text-red-500 uppercase tracking-widest hidden">錯誤：連線被拒絕</p>
            <p id="time-status" class="mt-2 text-[9px] text-zinc-600 font-bold uppercase"></p>
        </div>
    </div>

    <script>
        // 配置區
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        let lastCode = "";

        async function fetchAndCapture() {
            const email = document.getElementById('emailInput').value.trim();
            const btn = document.getElementById('queryBtn');
            const resultArea = document.getElementById('resultArea');
            const imgContainer = document.getElementById('image-container');
            const errorMsg = document.getElementById('error-msg');
            const connStatus = document.getElementById('connection-status');
            const connDot = document.querySelector('#connection-dot span');

            if (!email) return alert('請輸入帳號');

            // 1. 初始化狀態
            btn.disabled = true;
            resultArea.classList.remove('hidden');
            errorMsg.classList.add('hidden');
            imgContainer.innerHTML = '<div class="text-zinc-700 font-black text-4xl loading">正在通訊...</div>';
            connStatus.innerText = "連線中";
            connDot.className = "w-1.5 h-1.5 bg-yellow-500 animate-ping";

            try {
                // 2. 請求與錯誤檢查
                const response = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(email)}`);
                
                if (response.status === 401 || response.status === 403) {
                    throw new Error('Script 權限設定錯誤：請設為「所有人」存取');
                }

                const text = await response.text();
                const match = text.match(/\d{6}/);

                if (match) {
                    lastCode = match[0];
                    renderCodeToImage(lastCode);
                    connStatus.innerText = "已連線";
                    connDot.className = "w-1.5 h-1.5 bg-green-500";
                    document.getElementById('time-status').innerText = "最後更新: " + new Date().toLocaleTimeString();
                } else {
                    throw new Error('查無驗證碼：請確認 Adobe 是否已發送郵件');
                }

            } catch (err) {
                console.error(err);
                imgContainer.innerHTML = '<div class="text-zinc-800 text-5xl font-black italic">!</div>';
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                connStatus.innerText = "連線錯誤";
                connDot.className = "w-1.5 h-1.5 bg-red-500";
            } finally {
                btn.disabled = false;
            }
        }

        async function renderCodeToImage(code) {
            const source = document.getElementById('canvas-source');
            const container = document.getElementById('image-container');
            source.innerText = code;
            
            const canvas = await html2canvas(source, { backgroundColor: null, scale: 2 });
            const imgData = canvas.toDataURL("image/png");
            container.innerHTML = `<img src="${imgData}" class="screenshot-display" title="點擊複製驗證碼">`;
        }

        function copyValue() {
            if (!lastCode) return;
            navigator.clipboard.writeText(lastCode).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
