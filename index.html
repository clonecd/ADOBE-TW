<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 帳號驗證碼查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f5f5f7; font-family: sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* 載入動畫 */
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3182ce;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md glass-card rounded-3xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Adobe 帳號驗證碼查詢</h1>
            <p class="text-gray-500 mt-2 text-sm">快速查詢您的電子郵件帳號驗證碼</p>
        </div>

        <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-6">
            <p class="text-sm text-amber-700">驗證碼輸入錯誤禁止重複輸入！請獲取最新驗證碼。</p>
        </div>

        <div class="space-y-4">
            <input type="email" id="email" placeholder="請輸入您的電子郵件帳號" 
                class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            
            <button onclick="fetchCode()" id="queryBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center gap-2">
                <span>立即查詢</span>
            </button>
        </div>

        <div id="result-box" class="hidden mt-8 pt-6 border-t border-gray-100 text-center">
            <span class="text-sm text-gray-400 tracking-widest uppercase">最新驗證碼</span>
            <div id="code-display" class="text-4xl font-mono font-bold text-blue-600 mt-2 tracking-widest">
                ------
            </div>
            <p id="status-msg" class="text-xs mt-3 text-gray-400"></p>
        </div>
    </div>

    <script>
        async function fetchCode() {
            const email = document.getElementById('email').value;
            const btn = document.getElementById('queryBtn');
            const resultBox = document.getElementById('result-box');
            const codeDisplay = document.getElementById('code-display');
            const statusMsg = document.getElementById('status-msg');

            if (!email) {
                alert('請輸入電子郵件！');
                return;
            }

            // 1. 進入讀取狀態
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> 查詢中...';
            resultBox.classList.remove('hidden');
            codeDisplay.innerText = "------";
            statusMsg.innerText = "正在連線至伺服器...";

            try {
                // 這裡替換為真實的 API URL
                // 例如: https://api.psai.xin/get_code?email=xxx
                const response = await fetch(`https://api.psai.xin/v1/query?email=${encodeURIComponent(email)}`, {
                    method: 'GET', // 或 'POST'，取決於原網站設定
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok && data.code) {
                    codeDisplay.innerText = data.code; // 假設返回 JSON 格式為 { "code": "123456" }
                    statusMsg.innerText = "獲取成功";
                } else {
                    codeDisplay.innerText = "ERROR";
                    statusMsg.innerText = data.message || "查無此帳號或請求過快";
                }
            } catch (error) {
                console.error('查詢失敗:', error);
                codeDisplay.innerText = "失敗";
                statusMsg.innerText = "網路錯誤或 API 無法連線";
            } finally {
                // 2. 恢復按鈕狀態
                btn.disabled = false;
                btn.innerHTML = '<span>立即查詢</span>';
            }
        }
    </script>
</body>
</html>
