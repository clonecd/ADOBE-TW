<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe 驗證碼查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #0c0c0e; color: #f4f4f5; }
        .glass-card { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .code-display { cursor: pointer; transition: all 0.2s; letter-spacing: -0.02em; }
        .code-display:hover { transform: scale(1.05); color: #60a5fa; }
        .code-display:active { transform: scale(0.95); }
        .copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 10px 20px; border-radius: 99px; font-size: 12px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .loading { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="toast" class="copy-toast shadow-xl">✓ 驗證碼已複製到剪貼簿</div>

    <div class="w-full max-w-md glass-card rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
        
        <header class="text-center mb-10">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 mb-6">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Secure Tunnel Active</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-white mb-1">Adobe 帳號查詢</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.4em] ml-1">點擊驗證碼即可複製</p>
        </header>

        <div class="space-y-6">
            <div class="space-y-2 text-center">
                <label class="text-[10px] font-black text-zinc-600 uppercase tracking-widest">目標郵箱</label>
                <div class="text-sm font-bold text-zinc-400">748kvi41b@psai.xin</div>
            </div>

            <button onclick="fetchCode()" id="queryBtn"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all active:scale-[0.98] shadow-lg shadow-blue-900/30">
                獲取最新驗證碼
            </button>
        </div>

        <div id="resultArea" class="mt-12 pt-8 border-t border-zinc-800 hidden text-center">
            <span class="text-[10px] font-black text-zinc-600 tracking-[0.3em] uppercase">Security Code</span>
            
            <div id="codeBox" onclick="copyToClipboard()" class="text-6xl font-black text-white mt-4 code-display italic">------</div>
            
            <p id="status" class="mt-6 text-[10px] font-bold text-zinc-500 italic uppercase">等待連線</p>
            <p id="hint" class="mt-2 text-[9px] text-zinc-700 hidden">點擊上方數字快速複製</p>
        </div>
    </div>

    <script>
        const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        const TARGET_EMAIL = '748kvi41b@psai.xin';

        async function fetchCode() {
            const btn = document.getElementById('queryBtn');
            const resultArea = document.getElementById('resultArea');
            const codeBox = document.getElementById('codeBox');
            const status = document.getElementById('status');
            const hint = document.getElementById('hint');

            btn.disabled = true;
            btn.innerText = '處理中...';
            resultArea.classList.remove('hidden');
            codeBox.innerText = "WAIT";
            codeBox.classList.add('loading');
            status.innerText = "正在穿透 HTTPS 限制";

            try {
                const response = await fetch(`${PROXY_URL}?email=${encodeURIComponent(TARGET_EMAIL)}`);
                const text = await response.text();
                const match = text.match(/\d{6}/);

                setTimeout(() => {
                    if (match) {
                        codeBox.innerText = match[0];
                        codeBox.classList.remove('loading');
                        status.innerText = "查詢完成 | " + new Date().toLocaleTimeString();
                        hint.classList.remove('hidden');
                    } else {
                        codeBox.innerText = "EMPTY";
                        status.innerText = "目前查無驗證碼資料";
                    }
                }, 500);

            } catch (err) {
                codeBox.innerText = "ERROR";
                status.innerText = "連線失敗，請檢查網路";
            } finally {
                btn.disabled = false;
                btn.innerText = '獲獲取最新驗證碼';
            }
        }

        // 複製功能
        function copyToClipboard() {
            const code = document.getElementById('codeBox').innerText;
            if (code === "------" || code === "WAIT" || code === "EMPTY" || code === "ERROR") return;

            navigator.clipboard.writeText(code).then(() => {
                const toast = document.getElementById('toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
