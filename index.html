<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAI 驗證碼安全框架</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; color: #fafafa; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .code-display { font-variant-numeric: tabular-nums; letter-spacing: 0.1em; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading { animation: pulse-soft 1.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden">
        <div class="absolute top-[-10%] right-[-10%] w-96 h-96 bg-blue-600/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-red-600/5 rounded-full blur-[100px]"></div>
    </div>

    <div class="w-full max-w-md glass rounded-[2.5rem] p-10 shadow-2xl">
        <header class="text-center mb-10">
            <div class="inline-block px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 mb-4">
                <span class="text-[10px] font-bold text-blue-400 tracking-widest uppercase italic">Secure Tunnel Connected</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter mb-1">PSAI LIVE</h1>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-[0.3em] ml-1">繁體安全通訊框架</p>
        </header>

        <div class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-zinc-500 ml-1 uppercase tracking-widest">目標郵箱帳號</label>
                <div class="w-full bg-zinc-900/50 border border-zinc-800 rounded-2xl px-6 py-4 text-zinc-300 font-mono text-sm">
                    748kvi41b@psai.xin
                </div>
            </div>

            <button onclick="fetchCode()" id="queryBtn"
                class="w-full bg-white hover:bg-zinc-200 text-black font-black py-4 rounded-2xl transition-all active:scale-[0.98] shadow-lg flex justify-center items-center gap-2">
                <span id="btnText">獲取最新驗證碼</span>
            </button>
        </div>

        <div id="resultArea" class="mt-12 pt-8 border-t border-zinc-800/50 hidden text-center">
            <span class="text-[10px] font-black text-zinc-600 tracking-[0.3em] uppercase">Current Verification Code</span>
            <div id="codeBox" class="text-6xl font-black text-white mt-4 code-display italic">------</div>
            <div id="statusMsg" class="mt-6 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">系統就緒</div>
        </div>
    </div>

    <footer class="mt-10 text-center">
        <p class="text-[9px] text-zinc-600 font-bold tracking-widest uppercase italic">
            Proxy via Google Apps Script Gateway
        </p>
    </footer>

    <script>
        // 這是你剛剛建立的 Google Script 轉發網址
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRbiVR0b0h328JkllhPCeWFZLlTj3WJTxl-QAut6VH9hzITIOUvHmIg5aKQvRNqqTBVQ/exec';
        const TARGET_EMAIL = '748kvi41b@psai.xin';

        async function fetchCode() {
            const btn = document.getElementById('queryBtn');
            const btnText = document.getElementById('btnText');
            const resultArea = document.getElementById('resultArea');
            const codeBox = document.getElementById('codeBox');
            const statusMsg = document.getElementById('statusMsg');

            // 進入讀取狀態
            btn.disabled = true;
            btnText.innerText = '正在通訊...';
            resultArea.classList.remove('hidden');
            codeBox.innerText = "QUERY";
            codeBox.classList.add('loading', 'text-zinc-700');
            statusMsg.innerText = "正在穿透 HTTPS 限制並讀取資料";

            try {
                // 透過 Google Script 發送請求
                const response = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(TARGET_EMAIL)}`);
                const text = await response.text();

                // 使用正則表達式提取 6 位連續數字
                const match = text.match(/\d{6}/);

                setTimeout(() => {
                    if (match) {
                        codeBox.innerText = match[0];
                        codeBox.classList.remove('loading', 'text-zinc-700');
                        codeBox.classList.add('text-white');
                        statusMsg.innerText = "查詢成功 | " + new Date().toLocaleTimeString();
                        statusMsg.classList.add('text-blue-500');
                    } else {
                        codeBox.innerText = "EMPTY";
                        statusMsg.innerText = "查無驗證碼，請確認 Adobe 是否已發送";
                    }
                }, 800);

            } catch (err) {
                console.error(err);
                codeBox.innerText = "ERROR";
                statusMsg.innerText = "Google Proxy 連線失敗，請檢查 Script 權限";
                statusMsg.classList.add('text-red-500');
            } finally {
                btn.disabled = false;
                btnText.innerText = '獲取最新驗證碼';
                codeBox.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
