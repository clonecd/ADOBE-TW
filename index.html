<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAI Live | 驗證碼查詢框架</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', "Microsoft JhengHei", sans-serif; background: #000; color: white; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #fff 0%, #888 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glow-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.2); }
        .glow-btn:hover { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4); }
        #code-display { letter-spacing: 0.15em; text-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-red-900/10 rounded-full blur-[120px]"></div>

    <main class="relative z-10 w-full max-w-lg px-6">
        <div class="glass rounded-[3rem] p-10 shadow-2xl">
            
            <header class="text-center mb-10">
                <div class="inline-block px-4 py-1 rounded-full bg-white/10 text-[10px] font-bold tracking-[0.2em] mb-4 text-blue-400">SYSTEM ONLINE</div>
                <h1 class="text-4xl font-black gradient-text tracking-tighter mb-2">PSAI LIVE</h1>
                <p class="text-gray-500 text-sm">Adobe 驗證碼安全查詢框架</p>
            </header>

            <div class="space-y-6">
                <div class="relative group">
                    <label class="absolute -top-2.5 left-5 px-2 bg-black/50 text-[10px] text-gray-400 font-bold tracking-widest">EMAIL ACCOUNT</label>
                    <input type="email" id="email" value="748kvi41b@psai.xin" 
                        class="w-full bg-transparent border-2 border-white/10 rounded-2xl px-6 py-5 outline-none focus:border-white transition-all text-lg font-medium">
                </div>

                <button onclick="fetchAPI()" id="mainBtn"
                    class="glow-btn w-full py-5 rounded-2xl font-bold text-lg flex justify-center items-center gap-3">
                    <span id="btnText">立即執行查詢</span>
                </button>
            </div>

            <section id="resultFrame" class="mt-12 pt-8 border-t border-white/5 text-center opacity-0 transition-opacity duration-500">
                <h2 class="text-[10px] font-black text-gray-500 tracking-[0.3em] uppercase mb-6">Security Code</h2>
                <div id="code-display" class="text-6xl font-black text-blue-500 italic">------</div>
                <div id="status-text" class="mt-6 text-[10px] text-gray-600 font-bold uppercase tracking-widest">Waiting for request...</div>
            </section>

        </div>

        <footer class="mt-10 text-center">
            <p class="text-[10px] text-gray-600 font-medium tracking-widest uppercase">
                &copy; 2026 PSAI Project &bull; 繁體介面框架取代版
            </p>
        </div>
    </main>

    <script>
        async function fetchAPI() {
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('mainBtn');
            const btnText = document.getElementById('btnText');
            const resultFrame = document.getElementById('resultFrame');
            const codeDisplay = document.getElementById('code-display');
            const statusText = document.getElementById('status-text');

            if (!email) return;

            // 進入加載狀態
            btn.disabled = true;
            btnText.innerText = '正在處理中...';
            resultFrame.style.opacity = '1';
            codeDisplay.innerText = "LOADING";
            codeDisplay.classList.add('animate-pulse');
            statusText.innerText = "正在連線至 live.psai.xin 伺服器";

            // 使用代理繞過 HTTPS 限制
            const target = `http://live.psai.xin/proxy.php?email=${encodeURIComponent(email)}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

            try {
                const response = await fetch(proxy);
                const data = await response.json();
                const content = data.contents;

                // 提取 6 位數字
                const code = content.match(/\d{6}/);

                setTimeout(() => {
                    if (code) {
                        codeDisplay.innerText = code[0];
                        codeDisplay.classList.remove('animate-pulse', 'text-blue-500');
                        codeDisplay.classList.add('text-white');
                        statusText.innerText = "查詢成功 | " + new Date().toLocaleTimeString();
                    } else {
                        codeDisplay.innerText = "EMPTY";
                        statusText.innerText = "收件匣目前沒有新的驗證碼";
                    }
                }, 800);

            } catch (err) {
                codeDisplay.innerText = "ERROR";
                statusText.innerText = "連線失敗，請檢查代理伺服器狀態";
            } finally {
                btn.disabled = false;
                btnText.innerText = '立即執行查詢';
                codeDisplay.classList.remove('animate-pulse');
            }
        }
    </script>
</body>
</html>
